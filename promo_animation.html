<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Case Of - Architecture Flow Animation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --gemma-color: #a855f7;
            --safety-color: #10b981;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Ambient glowing orbs for premium feel */
        .glow-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        .layout {
            display: flex;
            width: 1000px;
            max-width: 90vw;
            gap: 80px;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .flow {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            padding-left: 20px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            opacity: 0.2;
            transform: translateX(-30px);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 2;
        }

        .step.active {
            opacity: 1;
            transform: translateX(0);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .step.active[data-type="gemma"] {
            border-color: var(--gemma-color);
            box-shadow: 0 0 24px rgba(168, 85, 247, 0.2);
        }

        .step.active[data-type="safety"] {
            border-color: var(--safety-color);
            box-shadow: 0 0 24px rgba(16, 185, 129, 0.2);
        }

        .step.active[data-type="json"] {
            border-color: var(--accent);
            box-shadow: 0 0 24px rgba(56, 189, 248, 0.2);
        }

        .step-icon {
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .step-content {
            display: flex;
            flex-direction: column;
        }

        .step-title {
            font-weight: 500;
            font-size: 16px;
            letter-spacing: -0.01em;
        }

        /* Connecting Lines */
        .lines {
            position: absolute;
            top: 32px;
            bottom: 32px;
            left: 58px; /* 20px padding-left + 20px step-padding + 18px half-icon */
            width: 2px;
            background: rgba(255, 255, 255, 0.05);
            z-index: 1;
        }

        .line-fill {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to bottom, var(--accent), var(--gemma-color) 30%, var(--safety-color) 80%);
            height: 0%;
            transition: height 0.6s ease-in-out;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .code-panel {
            flex: 1.2;
            background: rgba(9, 11, 16, 0.8);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            font-family: 'Fira Code', monospace;
            font-size: 15px;
            line-height: 1.7;
            color: #c9d1d9;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .code-panel.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .code-header {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .keyword { color: #ff7b72; }
        .string { color: #a5d6ff; }
        .boolean { color: #79c0ff; }
        .number { color: #79c0ff; }

        .type-cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: var(--accent);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Syntax code spacing */
        pre {
            margin: 0;
            white-space: pre-wrap;
        }

    </style>
</head>
<body>
    <div class="glow-orb" style="top: -10%; left: -5%; background: var(--accent);"></div>
    <div class="glow-orb" style="top: 50%; right: -10%; background: var(--gemma-color);"></div>
    <div class="glow-orb" style="bottom: -20%; left: 40%; background: var(--safety-color);"></div>

    <div class="layout">
        <div class="flow" id="flow">
            <div class="lines">
                <div class="line-fill" id="line-fill"></div>
            </div>
            
            <div class="step" data-type="default">
                <div class="step-icon">👤</div>
                <div class="step-content"><div class="step-title">User input</div></div>
            </div>
            <div class="step" data-type="gemma">
                <div class="step-icon">✨</div>
                <div class="step-content"><div class="step-title">Gemma 4 on-device</div></div>
            </div>
            <div class="step" data-type="json">
                <div class="step-icon">📄</div>
                <div class="step-content"><div class="step-title">Workflow JSON</div></div>
            </div>
            <div class="step" data-type="safety">
                <div class="step-icon">🛡️</div>
                <div class="step-content"><div class="step-title">Kotlin safety validator</div></div>
            </div>
            <div class="step" data-type="default">
                <div class="step-icon">💾</div>
                <div class="step-content"><div class="step-title">Room database</div></div>
            </div>
            <div class="step" data-type="default">
                <div class="step-icon">⚙️</div>
                <div class="step-content"><div class="step-title">WorkManager trigger</div></div>
            </div>
            <div class="step" data-type="default">
                <div class="step-icon">🔔</div>
                <div class="step-content"><div class="step-title">Notification verification</div></div>
            </div>
            <div class="step" data-type="safety">
                <div class="step-icon">✅</div>
                <div class="step-content"><div class="step-title">User-approved action</div></div>
            </div>
            <div class="step" data-type="safety">
                <div class="step-icon">📜</div>
                <div class="step-content"><div class="step-title">Safety log</div></div>
            </div>
        </div>

        <div class="code-panel" id="code-panel">
            <div class="code-header">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <pre><span id="code-content"></span><span class="type-cursor" id="cursor"></span></pre>
        </div>
    </div>

    <script>
        const steps = document.querySelectorAll('.step');
        const lineFill = document.getElementById('line-fill');
        const codePanel = document.getElementById('code-panel');
        const codeContent = document.getElementById('code-content');
        const cursor = document.getElementById('cursor');

        const jsonCode = `{
  <span class="keyword">"trigger"</span>: <span class="string">"missed_checkin"</span>,
  <span class="keyword">"durationHours"</span>: <span class="number">24</span>,
  <span class="keyword">"verification"</span>: <span class="string">"ask_if_safe"</span>,
  <span class="keyword">"action"</span>: <span class="string">"prepare_sms"</span>,
  <span class="keyword">"requiresApproval"</span>: <span class="boolean">true</span>
}`;

        // Timing variables
        const stepDelay = 800; // ms between steps
        const totalSteps = steps.length;
        
        async function animate() {
            // Wait a moment before starting
            await new Promise(r => setTimeout(r, 1000));

            for (let i = 0; i < totalSteps; i++) {
                // Activate step
                steps[i].classList.add('active');

                // If step is Workflow JSON (index 2), show code panel
                if (i === 2) {
                    codePanel.classList.add('visible');
                    setTimeout(() => typeCode(), 500); // Start typing shortly after panel appears
                }

                // Update line fill
                if (i < totalSteps - 1) {
                    const progress = ((i + 1) / (totalSteps - 1)) * 100;
                    lineFill.style.height = progress + '%';
                }

                await new Promise(r => setTimeout(r, stepDelay));
            }
        }

        function typeCode() {
            codeContent.innerHTML = '';
            let text = jsonCode;
            let i = 0;

            function typeChar() {
                if (i < text.length) {
                    if (text.charAt(i) === '<') {
                        let tag = '';
                        while (i < text.length && text.charAt(i) !== '>') {
                            tag += text.charAt(i);
                            i++;
                        }
                        tag += '>';
                        i++; // skip '>'
                        codeContent.innerHTML += tag;
                        typeChar(); // Process next char immediately to skip HTML tags typing
                    } else {
                        codeContent.innerHTML += text.charAt(i);
                        i++;
                        setTimeout(typeChar, 25);
                    }
                } else {
                    cursor.style.display = 'none';
                }
            }
            typeChar();
        }

        // Start animation
        animate();
    </script>
</body>
</html>
